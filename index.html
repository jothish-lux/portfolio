<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://static.readdy.ai/image/e388132ef9f5fd635098124b371fd5db/c7d77f36202b3256f14092111c74bb58.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JO - Financial Head, Designer & Developer based in Warsaw, Poland. Specializing in customer support, financial coordination, creative design, and web development." />
    <meta name="keywords" content="JO, Portfolio, Designer, Developer, Financial Head, Warsaw, Poland, Web Design, Front-end Development, Video Editing" />
    <meta name="author" content="JO" />
    <meta property="og:title" content="JO - Designer & Developer Portfolio" />
    <meta property="og:description" content="Financial Head, Designer & Developer based in Warsaw, Poland" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://static.readdy.ai/image/e388132ef9f5fd635098124b371fd5db/c7d77f36202b3256f14092111c74bb58.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <title>JO - Designer & Developer Portfolio</title>
    <style>
      .rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        z-index: 99999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
      }
      
      @media (max-width: 768px) and (orientation: portrait) {
        .rotate-prompt {
          display: flex;
        }
        #root {
          display: none;
        }
        .rotate-prompt.hidden {
          display: none;
        }
        #root.portrait-mode {
          display: block;
        }
      }
      
      .rotate-icon {
        animation: rotate 2s ease-in-out infinite;
      }
      
      @keyframes rotate {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }

      .continue-portrait-btn {
        padding: 1rem 2rem;
        background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
        border-radius: 9999px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        font-size: 1rem;
      }

      .continue-portrait-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 40px rgba(255, 107, 53, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="rotate-prompt" id="rotatePrompt">
      <div class="rotate-icon">
        <i class="ri-smartphone-line text-6xl text-white"></i>
      </div>
      <div class="text-center">
        <h2 class="text-2xl font-bold text-white mb-2">Please Rotate Your Device</h2>
        <p class="text-white/60">This portfolio is best viewed in landscape mode</p>
      </div>
      <div class="flex items-center gap-3 text-primary mb-4">
        <i class="ri-arrow-left-line text-2xl"></i>
        <i class="ri-smartphone-line text-4xl" style="transform: rotate(90deg);"></i>
        <i class="ri-arrow-right-line text-2xl"></i>
      </div>
      <button class="continue-portrait-btn" id="continuePortraitBtn">
        Continue in Portrait View
      </button>
    </div>
    <div id="root"></div>
    <script>
      document.getElementById('continuePortraitBtn')?.addEventListener('click', function() {
        document.getElementById('rotatePrompt')?.classList.add('hidden');
        document.getElementById('root')?.classList.add('portrait-mode');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
